<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>カナミック確認チェッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;font-size:13px;color:#1a1a1a;background:#f5f5f0}
.app{max-width:100%;padding:10px}
h1{font-size:16px;font-weight:500;margin-bottom:10px;color:#1a1a1a}
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:4px}
.month-nav button{background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:15px;color:#1a1a1a;min-height:38px;-webkit-tap-highlight-color:transparent}
.month-nav button:disabled{opacity:0.3}
.month-label{font-size:15px;font-weight:500;min-width:80px;text-align:center}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.status-bar{font-size:11px;color:#666;margin-bottom:6px;min-height:16px}
.wrapper{overflow-x:auto;border:0.5px solid #ddd;border-radius:12px;background:#fff}
table{border-collapse:collapse;min-width:max-content;width:100%}
thead th{background:#f5f5f0;font-weight:500;font-size:11px;white-space:nowrap;padding:0}
.col-name{position:sticky;left:0;z-index:10;background:#f5f5f0;padding:7px 10px;text-align:left;border-right:0.5px solid #ddd;width:80px;min-width:80px}
.col-name-body{position:sticky;left:0;z-index:5;background:#fff;padding:5px 10px;border-right:0.5px solid #ddd;width:80px;min-width:80px;font-weight:500;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tr:nth-child(even) .col-name-body{background:#fafaf8}
tr:nth-child(even) td{background:#fafaf8}
.date-header{padding:3px 0;text-align:center;width:48px;min-width:48px;border-left:0.5px solid #ddd}
.day-num{font-size:12px;font-weight:500}
.day-name{font-size:10px;color:#888}
.sat .day-num,.sat .day-name{color:#185FA5}
.sun .day-num,.sun .day-name{color:#A32D2D}
.today-col .day-num,.today-col .day-name{color:#0F6E56;font-weight:700}
td.cell{padding:3px;text-align:center;border-left:0.5px solid #ddd;vertical-align:middle}
.btn-cell{display:inline-flex;align-items:center;justify-content:center;width:38px;height:30px;border-radius:6px;font-size:10px;font-weight:500;cursor:pointer;border:0.5px solid #ccc;user-select:none;-webkit-tap-highlight-color:transparent;transition:opacity 0.1s}
.btn-cell:active{opacity:0.6;transform:scale(0.95)}
.st-none{background:#fff;color:#aaa;border-color:#ddd}
.st-done{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.st-off{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.st-future{background:none;border:none;cursor:default;color:#ccc}
tr:nth-child(even) td.cell .btn-cell.st-none{background:#fafaf8}
.today-highlight{outline:2px solid #1D9E75;outline-offset:-2px;border-radius:4px}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.stat-card{background:#f5f5f0;border-radius:8px;padding:8px 12px;text-align:center}
.stat-label{font-size:11px;color:#666}
.stat-val{font-size:22px;font-weight:500;margin-top:2px}
.admin-section{margin-top:14px;border-top:0.5px solid #ddd;padding-top:12px}
.admin-toggle{background:#fff;border:0.5px dashed #ccc;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:#666;width:100%;-webkit-tap-highlight-color:transparent}
.pw-area{margin-top:8px;display:flex;gap:6px}
.pw-area input{border:0.5px solid #ccc;border-radius:8px;padding:8px 12px;font-size:14px;flex:1;color:#1a1a1a;background:#fff}
.pw-area button{border:0.5px solid #ccc;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px;background:#fff;color:#1a1a1a;white-space:nowrap}
.pw-err{font-size:11px;color:#A32D2D;margin-top:4px}
.staff-mgr{margin-top:10px}
.add-row{display:flex;gap:6px;margin-bottom:10px}
.add-row input{border:0.5px solid #ccc;border-radius:8px;padding:8px 12px;font-size:14px;flex:1;color:#1a1a1a;background:#fff}
.add-row button{border:0.5px solid #ccc;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px;background:#fff;color:#1a1a1a;white-space:nowrap}
.staff-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#f5f5f0;border:0.5px solid #ccc;border-radius:20px;padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:8px}
.chip-del{background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;padding:0;line-height:1;-webkit-tap-highlight-color:transparent}
.chip-del:active{color:#A32D2D}
.lock-btn{background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;color:#666;margin-top:10px;-webkit-tap-highlight-color:transparent}
.saving{color:#854F0B}
.saved{color:#0F6E56}
.error{color:#A32D2D}
</style>
</head>
<body>
<div class="app">
<h1>カナミック確認チェッカー</h1>
<div class="topbar">
  <div class="month-nav">
    <button id="prev">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button id="next">&#8250;</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#C0DD97;border:0.5px solid #639922"></div>確認</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FAC775;border:0.5px solid #EF9F27"></div>休み</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff;border:0.5px solid #ccc"></div>未確認</div>
  </div>
</div>
<div class="status-bar" id="status-bar">Firebase に接続中...</div>

<div class="wrapper" id="table-wrapper">
  <table id="main-table">
    <thead><tr id="header-row"></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="admin-section">
  <button class="admin-toggle" id="admin-toggle">管理者メニュー（スタッフ追加・削除）</button>
  <div id="pw-area" class="pw-area" style="display:none">
    <input type="password" id="pw-input" placeholder="管理者パスワード" />
    <button id="pw-btn">解除</button>
  </div>
  <div id="pw-err" class="pw-err" style="display:none">パスワードが違います</div>
  <div id="staff-mgr" class="staff-mgr" style="display:none">
    <div class="add-row">
      <input id="new-name" placeholder="名前を入力（例：田中 Ns）" />
      <button id="add-btn">追加</button>
    </div>
    <div class="staff-chips" id="staff-chips"></div>
    <button class="lock-btn" id="lock-btn">ロックする</button>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const ADMIN_PASSWORD = '1234';

const firebaseConfig = {
  apiKey: "AIzaSyBadzbTrjw1qKA07Rb7eZU2opwBd59ZlRY",
  authDomain: "kanamic-checker.firebaseapp.com",
  projectId: "kanamic-checker",
  storageBucket: "kanamic-checker.firebasestorage.app",
  messagingSenderId: "256973271680",
  appId: "1:256973271680:web:1a4c83254ae18d4ff26c65",
  databaseURL: "https://kanamic-checker-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TODAY = new Date();
TODAY.setHours(0,0,0,0);
const minDate = new Date(TODAY.getFullYear(), TODAY.getMonth()-2, 1);

let staff = [];
let data = {};
let currentYear = TODAY.getFullYear();
let currentMonth = TODAY.getMonth();
let adminUnlocked = false;
let dbReady = false;

function setStatus(msg, cls){
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (cls ? ' '+cls : '');
}

function safeName(name){ return name.replace(/[.#$[\]/]/g,'_'); }
function dbKeyPath(y,m,d,name){ return `checks/${y}_${String(m+1).padStart(2,'0')}/${String(d).padStart(2,'0')}/${safeName(name)}`; }
function localKey(y,m,d,name){ return `${y}-${m}-${d}-${name}`; }
function nextState(s){ return s==='none'?'done':s==='done'?'off':'none'; }
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
const DAY_NAMES=['日','月','火','水','木','金','土'];
function getState(y,m,d,name){ return data[localKey(y,m,d,name)]||'none'; }
function setLocalState(y,m,d,name,val){ data[localKey(y,m,d,name)]=val; }

function render(preserveScroll){
  const wrapper=document.getElementById('table-wrapper');
  const sl=preserveScroll?wrapper.scrollLeft:null;
  const year=currentYear,month=currentMonth;
  const days=daysInMonth(year,month);
  document.getElementById('month-label').textContent=`${year}年${month+1}月`;

  const prevBtn=document.getElementById('prev');
  const nextBtn=document.getElementById('next');
  prevBtn.disabled=new Date(year,month,1)<=minDate;
  nextBtn.disabled=new Date(year,month+1,1)>=new Date(TODAY.getFullYear(),TODAY.getMonth()+1,1);

  const thead=document.getElementById('header-row');
  thead.innerHTML='';
  const thName=document.createElement('th');
  thName.className='col-name';
  thName.textContent='担当者';
  thead.appendChild(thName);
  for(let d=1;d<=days;d++){
    const dt=new Date(year,month,d);
    const dow=dt.getDay();
    const isToday=dt.getTime()===TODAY.getTime();
    const th=document.createElement('th');
    th.className='date-header'+(dow===6?' sat':dow===0?' sun':'')+(isToday?' today-col':'');
    th.innerHTML=`<div class="day-num">${d}</div><div class="day-name">${DAY_NAMES[dow]}</div>`;
    thead.appendChild(th);
  }

  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  staff.forEach(name=>{
    const tr=document.createElement('tr');
    const tdName=document.createElement('td');
    tdName.className='col-name-body';
    tdName.textContent=name;
    tr.appendChild(tdName);
    for(let d=1;d<=days;d++){
      const dt=new Date(year,month,d);
      const isFuture=dt>TODAY;
      const isToday=dt.getTime()===TODAY.getTime();
      const st=getState(year,month,d,name);
      const td=document.createElement('td');
      td.className='cell';
      if(isFuture){
        const btn=document.createElement('div');
        btn.className='btn-cell st-future';
        btn.textContent='－';
        td.appendChild(btn);
      } else {
        const btn=document.createElement('div');
        const stClass=st==='done'?'st-done':st==='off'?'st-off':'st-none';
        const lbl=st==='done'?'確認':st==='off'?'休み':'未確認';
        btn.className='btn-cell '+stClass+(isToday?' today-highlight':'');
        btn.textContent=lbl;
        btn.dataset.y=year;btn.dataset.m=month;btn.dataset.d=d;btn.dataset.n=name;
        btn.addEventListener('click',onCellClick);
        td.appendChild(btn);
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });

  renderStats();
  renderChips();
  if(sl!==null) wrapper.scrollLeft=sl;
  else scrollToToday();
}

function scrollToToday(){
  if(currentYear===TODAY.getFullYear()&&currentMonth===TODAY.getMonth()){
    const wrapper=document.getElementById('table-wrapper');
    const ths=document.querySelectorAll('#header-row th');
    const idx=TODAY.getDate();
    if(ths[idx]) wrapper.scrollLeft=Math.max(0,ths[idx].offsetLeft-100);
  }
}

async function onCellClick(e){
  const b=e.currentTarget;
  const y=+b.dataset.y,m=+b.dataset.m,d=+b.dataset.d,n=b.dataset.n;
  const cur=getState(y,m,d,n);
  const next=nextState(cur);
  setLocalState(y,m,d,n,next);
  render(true);
  setStatus('保存中...','saving');
  try{
    await set(ref(db, dbKeyPath(y,m,d,n)), next==='none'?null:next);
    setStatus('接続済み — データをリアルタイムで保存しています','saved');
  } catch(err){
    setStatus('保存エラー: '+err.message,'error');
  }
}

function renderStats(){
  const year=currentYear,month=currentMonth;
  const today_d=year===TODAY.getFullYear()&&month===TODAY.getMonth()?TODAY.getDate():daysInMonth(year,month);
  let total=0,done=0,off=0,missing=0;
  staff.forEach(name=>{
    for(let d=1;d<=today_d;d++){
      const dt=new Date(year,month,d);
      if(dt>TODAY)continue;
      const st=getState(year,month,d,name);
      total++;
      if(st==='done')done++;
      else if(st==='off')off++;
      else missing++;
    }
  });
  const pct=total-off>0?Math.round(done/(total-off)*100):0;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">確認済</div><div class="stat-val" style="color:#3B6D11">${done}</div></div>
    <div class="stat-card"><div class="stat-label">未確認</div><div class="stat-val" style="color:#A32D2D">${missing}</div></div>
    <div class="stat-card"><div class="stat-label">休み</div><div class="stat-val" style="color:#854F0B">${off}</div></div>
    <div class="stat-card"><div class="stat-label">確認率（今月）</div><div class="stat-val">${total-off>0?pct+'%':'―'}</div></div>
  `;
}

function renderChips(){
  if(!adminUnlocked) return;
  const el=document.getElementById('staff-chips');
  el.innerHTML='';
  staff.forEach((name,i)=>{
    const chip=document.createElement('div');
    chip.className='chip';
    chip.innerHTML=`${name}<button class="chip-del" data-i="${i}">×</button>`;
    el.appendChild(chip);
  });
  el.querySelectorAll('.chip-del').forEach(b=>{
    b.addEventListener('click',()=>{
      staff.splice(+b.dataset.i,1);
      set(ref(db,'staff'),staff);
      render(true);
    });
  });
}

async function loadMonth(y,m){
  const pad=v=>String(v).padStart(2,'0');
  const path=`checks/${y}_${pad(m+1)}`;
  try{
    const snap=await get(ref(db,path));
    if(snap.exists()){
      const days=daysInMonth(y,m);
      for(let d=1;d<=days;d++){
        const dayData=snap.child(pad(d)).val();
        if(dayData){
          staff.forEach(name=>{
            const sn=safeName(name);
            if(dayData[sn]) setLocalState(y,m,d,name,dayData[sn]);
          });
        }
      }
    }
  } catch(e){}
  render(false);
}

onValue(ref(db,'staff'), async snap=>{
  const val=snap.val();
  if(val&&Array.isArray(val)){
    staff=val;
  } else if(!val){
    staff=['田中 (Ns)','鈴木 (Ns)','山本 (Ns)','佐藤 (PT)','伊藤 (OT)','渡辺 (St)'];
    await set(ref(db,'staff'),staff);
  }
  await loadMonth(currentYear,currentMonth);
  setStatus('接続済み — データをリアルタイムで保存しています','saved');
  dbReady=true;
});

onValue(ref(db,'.info/connected'), snap=>{
  if(!snap.val()) setStatus('オフライン（再接続中...）','saving');
  else if(dbReady) setStatus('接続済み — データをリアルタイムで保存しています','saved');
});

document.getElementById('prev').addEventListener('click',()=>{
  if(currentMonth===0){currentMonth=11;currentYear--;}else{currentMonth--;}
  loadMonth(currentYear,currentMonth);
});
document.getElementById('next').addEventListener('click',()=>{
  if(currentMonth===11){currentMonth=0;currentYear++;}else{currentMonth++;}
  loadMonth(currentYear,currentMonth);
});

document.getElementById('admin-toggle').addEventListener('click',()=>{
  if(adminUnlocked) return;
  const pa=document.getElementById('pw-area');
  pa.style.display=pa.style.display==='none'?'flex':'none';
  document.getElementById('pw-err').style.display='none';
});

document.getElementById('pw-btn').addEventListener('click',()=>{
  const val=document.getElementById('pw-input').value;
  if(val===ADMIN_PASSWORD){
    adminUnlocked=true;
    document.getElementById('pw-area').style.display='none';
    document.getElementById('pw-err').style.display='none';
    document.getElementById('pw-input').value='';
    document.getElementById('staff-mgr').style.display='block';
    document.getElementById('admin-toggle').textContent='管理者メニュー（解除中）';
    renderChips();
  } else {
    document.getElementById('pw-err').style.display='block';
  }
});
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pw-btn').click();});

document.getElementById('lock-btn').addEventListener('click',()=>{
  adminUnlocked=false;
  document.getElementById('staff-mgr').style.display='none';
  document.getElementById('admin-toggle').textContent='管理者メニュー（スタッフ追加・削除）';
});

document.getElementById('add-btn').addEventListener('click',async()=>{
  const inp=document.getElementById('new-name');
  const name=inp.value.trim();
  if(name&&!staff.includes(name)){
    staff.push(name);
    await set(ref(db,'staff'),staff);
    inp.value='';
    render(true);
  }
});
document.getElementById('new-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-btn').click();});
</script>
</body>
</html>
